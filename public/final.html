<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Repo Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }
    h1 {
      text-align: center;
      padding: 20px;
      color: #22c55e;
    }
    .container {
      padding: 20px;
    }
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #22c55e;
      color: #000;
      font-weight: bold;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .list {
      margin-top: 10px;
    }
    .item {
      padding: 8px;
      border-bottom: 1px solid #334155;
    }
    input {
      padding: 8px;
      border-radius: 6px;
      border: none;
      margin-right: 10px;
    }
  </style>
</head>
<body>

<h1>🚗 Repo Tracker</h1>

<div class="container">

  <div class="card">
    <h3>Agregar Repo</h3>
    <input id="repoInput" placeholder="ID o VIN">
    <button class="btn" onclick="addRepo()">Agregar</button>
  </div>

  <div class="card">
    <h3>Repos Registrados</h3>
    <div id="repoList" class="list"></div>
  </div>

</div>

<script>
  let repos = JSON.parse(localStorage.getItem('repos') || '[]');

  function render() {
    const list = document.getElementById('repoList');
    list.innerHTML = '';

    repos.forEach((r, i) => {
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = \`
        \${r}
        <button onclick="removeRepo(\${i})" style="float:right;color:red;background:none;border:none;">✕</button>
      \`;
      list.appendChild(div);
    });
  }

  function addRepo() {
    const input = document.getElementById('repoInput');
    if (!input.value) return;
    repos.push(input.value);
    input.value = '';
    save();
  }

  function removeRepo(i) {
    repos.splice(i, 1);
    save();
  }

  function save() {
    localStorage.setItem('repos', JSON.stringify(repos));
    render();
  }

  render();
</script>

</body>
</html>
